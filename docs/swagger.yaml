basePath: /api/v1
definitions:
  common.PaginationResponse:
    properties:
      limit:
        description: 每页数量
        type: integer
      page:
        description: 当前页码
        type: integer
      total:
        description: 数据总条数
        type: integer
    type: object
  dto.AccessLogListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/model.AccessLog'
        type: array
      pagination:
        $ref: '#/definitions/common.PaginationResponse'
    type: object
  dto.AddTagRequest:
    properties:
      tagName:
        description: 标签名，必填，长度限制1-30
        maxLength: 30
        minLength: 1
        type: string
    required:
    - tagName
    type: object
  dto.CheckExistenceResponse:
    properties:
      exists:
        type: boolean
    type: object
  dto.CreateShareRequest:
    description: '...'
    properties:
      shareDesc:
        description: 分享描述
        type: string
      shareImage:
        description: 分享封面图URL
        type: string
      shareTitle:
        description: 分享标题
        type: string
      shortCode:
        description: 关联短码
        type: string
    type: object
  dto.DeviceStatsResponse:
    properties:
      name:
        description: 设备/系统/浏览器名称
        type: string
      value:
        description: 对应的点击量
        type: integer
    type: object
  dto.ExecuteRecoveryRequest:
    properties:
      recoveryToken:
        type: string
    required:
    - recoveryToken
    type: object
  dto.ExtendShortlinkExpirationRequest:
    properties:
      expiresIn:
        description: 限制了只能传入指定的有效期字符串
        enum:
        - 7d
        - 30d
        - 90d
        - 1y
        - never
        type: string
    required:
    - expiresIn
    type: object
  dto.ForgotPasswordRequest:
    properties:
      account:
        description: 手机号或邮箱
        type: string
      type:
        enum:
        - email
        - phone
        type: string
    required:
    - account
    type: object
  dto.GetShareInfoResponse:
    properties:
      shareDesc:
        description: 分享描述
        type: string
      shareImage:
        description: 分享封面图URL
        type: string
      shareTitle:
        description: 分享标题
        type: string
      shortCode:
        description: 关联短码
        type: string
    type: object
  dto.GlobalStatsResponse:
    properties:
      activeUsers:
        description: 近30天活跃用户数
        type: integer
      topLinks:
        description: Top 5 热门短链接
        items:
          $ref: '#/definitions/dto.TopLinkInfo'
        type: array
      totalClicks:
        description: 平台总点击量
        type: integer
      totalShortlinks:
        description: 平台短链接总数
        type: integer
    type: object
  dto.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  dto.LoginResponse:
    properties:
      accessToken:
        description: 短期访问令牌
        type: string
      refreshToken:
        description: 长期刷新令牌
        type: string
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.OverviewStatsResponse:
    properties:
      clicksToday:
        description: 今日点击量
        type: integer
      topRegion:
        description: 点击量最高的地域（省份/国家）
        type: string
      topSource:
        description: 点击量最高的来源（暂未实现）
        type: string
      totalClicks:
        description: 短链接历史总点击量
        type: integer
    type: object
  dto.RefreshTokenRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  dto.RegionStatsResponse:
    properties:
      name:
        description: 地域名称（如 "广东省" 或 "深圳市"）
        type: string
      value:
        description: 对应的点击量
        type: integer
    type: object
  dto.RegisterRequest:
    properties:
      account:
        description: Account 是用于接收验证码和绑定的账号（邮箱或手机号）
        type: string
      captcha:
        type: string
      password:
        maxLength: 32
        minLength: 6
        type: string
      type:
        description: Type 指明了Account的类型
        enum:
        - email
        - phone
        type: string
      username:
        maxLength: 32
        minLength: 3
        type: string
    required:
    - account
    - captcha
    - password
    - username
    type: object
  dto.RemoveTagRequest:
    properties:
      tagName:
        type: string
    required:
    - tagName
    type: object
  dto.RequestRecoveryRequest:
    properties:
      account:
        type: string
      type:
        enum:
        - email
        - phone
        type: string
    required:
    - account
    type: object
  dto.ResetPasswordRequest:
    properties:
      password:
        maxLength: 32
        minLength: 6
        type: string
      resetToken:
        type: string
    required:
    - password
    - resetToken
    type: object
  dto.SendCaptchaRequest:
    properties:
      account:
        description: 手机号或邮箱
        type: string
      scene:
        description: 场景 (register/login/reset_pwd等)
        type: string
      type:
        description: 类型，默认为email
        enum:
        - sms
        - email
        type: string
    required:
    - account
    - scene
    type: object
  dto.SendCaptchaResponse:
    properties:
      expire_second:
        description: 验证码有效期（秒）
        type: integer
      next_send_second:
        description: 下次可发送的冷却时间（秒）
        type: integer
    type: object
  dto.ShareInfo:
    properties:
      desc:
        type: string
      image:
        type: string
      title:
        type: string
    type: object
  dto.ShareResponse:
    description: 响应给客户端的 Share 信息，屏蔽了敏感字段
    properties:
      created_at:
        type: string
      id:
        type: integer
      shareDesc:
        description: 分享描述
        type: string
      shareImage:
        description: 分享封面图URL
        type: string
      shareTitle:
        description: 分享标题
        type: string
      shortCode:
        description: 关联短码
        type: string
      updated_at:
        type: string
    type: object
  dto.ShortlinkDetailResponse:
    properties:
      clickCount:
        type: integer
      created_at:
        type: string
      expireAt:
        type: string
      originalUrl:
        type: string
      share:
        allOf:
        - $ref: '#/definitions/dto.ShareInfo'
        description: 关联的分享信息
      shortCode:
        type: string
      shortUrl:
        type: string
      status:
        type: integer
      tags:
        description: 关联的标签名列表
        items:
          type: string
        type: array
    type: object
  dto.ShortlinkListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.ShortlinkDetailResponse'
        type: array
      pagination:
        $ref: '#/definitions/common.PaginationResponse'
    type: object
  dto.ShortlinkResponse:
    description: 响应给客户端的 Shortlink 信息，屏蔽了敏感字段
    properties:
      clickCount:
        description: 点击量统计
        type: integer
      created_at:
        type: string
      expireAt:
        description: 过期时间（NULL=永久）
        type: string
      id:
        type: integer
      isCustom:
        description: 是否为自定义短码（1=是）
        type: integer
      isHot:
        description: 是否为热点短码（1=是，日访问≥1000）
        type: integer
      lastWarnAt:
        description: 最近一次失效预警发送时间
        type: string
      originalUrl:
        description: 原始长链接（URLEncode编码）
        type: string
      originalUrlMd5:
        description: 原始长链接的MD5摘要
        type: string
      shortCode:
        description: 短码（Base62，区分大小写）
        type: string
      shortUrl:
        description: 完整的短链接URL
        type: string
      status:
        description: 状态（1=有效，0=失效）
        type: integer
      updated_at:
        type: string
      userId:
        description: 关联用户ID（管理员为0）
        type: integer
    type: object
  dto.SourceStatsResponse:
    properties:
      name:
        description: 来源渠道名称
        type: string
      value:
        description: 对应的点击量
        type: integer
    type: object
  dto.TagListResponse:
    properties:
      tags:
        items:
          type: string
        type: array
    type: object
  dto.TopLinkInfo:
    properties:
      clickCount:
        description: 点击量
        type: integer
      originalUrl:
        description: 原始链接（可选）
        type: string
      shortCode:
        description: 短码
        type: string
    type: object
  dto.TrendStatsResponse:
    properties:
      clicks:
        description: 当日点击量
        type: integer
      date:
        description: 日期 (YYYY-MM-DD)
        type: string
    type: object
  dto.UpdatePasswordRequest:
    properties:
      newPassword:
        maxLength: 32
        minLength: 6
        type: string
      oldPassword:
        type: string
    required:
    - newPassword
    - oldPassword
    type: object
  dto.UpdateShareInfoRequest:
    properties:
      shareDesc:
        description: 分享描述
        maxLength: 100
        type: string
      shareImage:
        description: 分享封面图URL
        type: string
      shareTitle:
        description: 分享标题
        maxLength: 50
        type: string
    type: object
  dto.UpdateShareRequest:
    description: '...'
    properties:
      shareDesc:
        description: 分享描述
        type: string
      shareImage:
        description: 分享封面图URL
        type: string
      shareTitle:
        description: 分享标题
        type: string
      shortCode:
        description: 关联短码
        type: string
    type: object
  dto.UpdateShortlinkRequest:
    description: '...'
    properties:
      expiresIn:
        enum:
        - 7d
        - 30d
        - 90d
        - 1y
        - never
        type: string
      originalUrl:
        description: 原始长链接（URLEncode编码）
        type: string
      status:
        description: 状态（1=有效，0=失效）
        enum:
        - 0
        - 1
        type: integer
    type: object
  dto.UpdateShortlinkStatusRequest:
    properties:
      status:
        description: |-
          使用指针和 binding:"required" 确保该字段必须被传入
          oneof=0 1 限制了状态值只能是 0 (失效) 或 1 (有效)
        enum:
        - 0
        - 1
        type: integer
    required:
    - status
    type: object
  dto.UpdateUserRequest:
    properties:
      avatar:
        type: string
      email:
        type: string
      nickname:
        maxLength: 32
        type: string
      phone:
        type: string
      username:
        maxLength: 32
        minLength: 3
        type: string
    type: object
  dto.UpdateUserStatusRequest:
    properties:
      status:
        description: |-
          状态值，必填，且必须是预定义的状态之一
          oneof 的值应与 model/user.go 中的常量保持一致
        enum:
        - 1
        - 2
        - 3
        type: integer
    required:
    - status
    type: object
  dto.UserCreateShortlinkRequest:
    properties:
      expiresIn:
        enum:
        - 1h
        - 24h
        - 7d
        - 30d
        - 90d
        - 1y
        - never
        type: string
      originalUrl:
        type: string
      shortCode:
        description: 'omitempty: 可选; alphanum: 只能是字母和数字; min/max: 长度限制'
        maxLength: 8
        minLength: 6
        type: string
    required:
    - originalUrl
    type: object
  dto.UserListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.UserResponse'
        type: array
      pagination:
        $ref: '#/definitions/common.PaginationResponse'
    type: object
  dto.UserResponse:
    properties:
      avatar:
        type: string
      createdAt:
        type: string
      email:
        type: string
      id:
        type: integer
      lastLoginAt:
        type: string
      nickname:
        type: string
      phone:
        type: string
      role:
        type: integer
      status:
        type: integer
      username:
        type: string
    type: object
  dto.VerifyCaptchaRequest:
    properties:
      account:
        type: string
      captcha:
        description: 验证码通常为6位
        type: string
      scene:
        type: string
    required:
    - account
    - captcha
    - scene
    type: object
  dto.VerifyCaptchaResponse:
    properties:
      resetToken:
        description: 返回一次性的密码重置令牌
        type: string
    type: object
  dto.VerifyOnceCaptchaRequest:
    properties:
      account:
        type: string
      captcha:
        type: string
      type:
        enum:
        - email
        - phone
        type: string
    required:
    - account
    - captcha
    type: object
  dto.VerifyRecoveryCaptchaRequest:
    properties:
      account:
        type: string
      captcha:
        type: string
      type:
        enum:
        - email
        - phone
        type: string
    required:
    - account
    - captcha
    type: object
  dto.VerifyRecoveryCaptchaResponse:
    properties:
      recoveryToken:
        description: 返回一次性的账号恢复令牌
        type: string
    type: object
  model.AccessLog:
    properties:
      accessedAt:
        description: 访问时间
        type: string
      browser:
        description: 解析出的浏览器
        type: string
      channel:
        description: 访问来源渠道
        type: string
      city:
        description: 解析出的地理位置（城市）
        type: string
      deviceType:
        description: 解析出的设备类型（PC/Mobile/Tablet/Other）
        type: string
      id:
        description: 日志唯一标识
        type: integer
      ip:
        description: 访问IP地址
        type: string
      osVersion:
        description: 解析出的操作系统
        type: string
      province:
        description: 解析出的地理位置（省份）
        type: string
      shortCode:
        description: 关联的短码
        type: string
      userAgent:
        description: 设备User-Agent
        type: string
      userID:
        description: 访问者用户ID（0代表未登录）
        type: integer
    type: object
  response.Response:
    properties:
      code:
        description: 业务状态码
        type: integer
      data:
        description: 响应数据
      message:
        description: 响应消息
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
    url: http://www.example.com/support
  description: 短链接生成与管理服务的 API 文档
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: 短链接服务 API
  version: "1.0"
paths:
  /{shortCode}:
    get:
      description: 根据短码重定向到原始URL，同时记录访问统计
      parameters:
      - description: 短码
        in: path
        name: shortCode
        required: true
        type: string
      produces:
      - text/html
      responses:
        "302":
          description: 重定向到原始URL
          schema:
            type: string
        "404":
          description: 短链接不存在
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: 短链接重定向
      tags:
      - 短链接
  /admin/stats/global:
    get:
      description: 获取平台级别的全局统计数据（仅管理员可访问）
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.GlobalStatsResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 无管理员权限
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 获取平台全局统计
      tags:
      - 统计
  /admin/users:
    get:
      consumes:
      - application/json
      description: 管理员获取用户列表，支持分页和筛选
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: pageSize
        type: integer
      - description: 用户名（模糊查询）
        in: query
        name: username
        type: string
      - description: 用户状态
        in: query
        name: status
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserListResponse'
              type: object
        "401":
          description: 用户未认证
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 无权访问
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 获取用户列表
      tags:
      - 管理员-用户管理
  /admin/users/{id}/session:
    delete:
      consumes:
      - application/json
      description: 管理员强制指定用户下线
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 强制下线成功
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: 无效的用户ID
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 用户未认证
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 无权访问
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 强制用户下线
      tags:
      - 管理员-用户管理
  /admin/users/{id}/status:
    put:
      consumes:
      - application/json
      description: 管理员更新用户状态（正常/禁用/锁定）
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      - description: 状态信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateUserStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 用户未认证
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 无权访问
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 更新用户状态
      tags:
      - 管理员-用户管理
  /captcha/send:
    post:
      consumes:
      - application/json
      description: 向指定邮箱或手机发送验证码，用于注册、登录、重置密码等场景
      parameters:
      - description: 发送验证码请求体
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.SendCaptchaRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.SendCaptchaResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "429":
          description: 发送过于频繁
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: 发送验证码
      tags:
      - 验证码
  /captcha/verify:
    post:
      consumes:
      - application/json
      description: 验证用户输入的验证码是否正确
      parameters:
      - description: 验证请求体
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.VerifyCaptchaRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 验证码错误或已过期
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: 验证验证码
      tags:
      - 验证码
  /login:
    post:
      consumes:
      - application/json
      description: 用户登录获取访问令牌
      parameters:
      - description: 登录信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.LoginResponse'
              type: object
        "400":
          description: 用户名或密码错误
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 用户状态异常
          schema:
            $ref: '#/definitions/response.Response'
      summary: 用户登录
      tags:
