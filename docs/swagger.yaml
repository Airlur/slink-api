basePath: /api/v1
definitions:
  dto.CheckExistenceResponse:
    properties:
      exists:
        type: boolean
    type: object
  dto.ExecuteRecoveryRequest:
    properties:
      recoveryToken:
        type: string
    required:
    - recoveryToken
    type: object
  dto.ForgotPasswordRequest:
    properties:
      account:
        description: 手机号或邮箱
        type: string
      type:
        enum:
        - email
        - phone
        type: string
    required:
    - account
    type: object
  dto.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  dto.LoginResponse:
    properties:
      accessToken:
        description: 短期访问令牌
        type: string
      refreshToken:
        description: 长期刷新令牌
        type: string
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.RefreshTokenRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  dto.RegisterRequest:
    properties:
      account:
        description: Account 是用于接收验证码和绑定的账号（邮箱或手机号）
        type: string
      captcha:
        type: string
      password:
        maxLength: 32
        minLength: 6
        type: string
      type:
        description: Type 指明了Account的类型
        enum:
        - email
        - phone
        type: string
      username:
        maxLength: 32
        minLength: 3
        type: string
    required:
    - account
    - captcha
    - password
    - username
    type: object
  dto.RequestRecoveryRequest:
    properties:
      account:
        type: string
      type:
        enum:
        - email
        - phone
        type: string
    required:
    - account
    type: object
  dto.ResetPasswordRequest:
    properties:
      password:
        maxLength: 32
        minLength: 6
        type: string
      resetToken:
        type: string
    required:
    - password
    - resetToken
    type: object
  dto.UpdatePasswordRequest:
    properties:
      newPassword:
        maxLength: 32
        minLength: 6
        type: string
      oldPassword:
        type: string
    required:
    - newPassword
    - oldPassword
    type: object
  dto.UpdateUserRequest:
    properties:
      avatar:
        type: string
      email:
        type: string
      nickname:
        maxLength: 32
        type: string
      phone:
        type: string
      username:
        maxLength: 32
        minLength: 3
        type: string
    type: object
  dto.UpdateUserStatusRequest:
    properties:
      status:
        description: |-
          状态值，必填，且必须是预定义的状态之一
          oneof 的值应与 model/user.go 中的常量保持一致
        enum:
        - 1
        - 2
        - 3
        type: integer
    required:
    - status
    type: object
  dto.UserResponse:
    properties:
      avatar:
        type: string
      createdAt:
        type: string
      email:
        type: string
      id:
        type: integer
      lastLoginAt:
        type: string
      nickname:
        type: string
      phone:
        type: string
      role:
        type: integer
      status:
        type: integer
      username:
        type: string
    type: object
  dto.VerifyCaptchaResponse:
    properties:
      resetToken:
        description: 返回一次性的密码重置令牌
        type: string
    type: object
  dto.VerifyOnceCaptchaRequest:
    properties:
      account:
        type: string
      captcha:
        type: string
      type:
        enum:
        - email
        - phone
        type: string
    required:
    - account
    - captcha
    type: object
  dto.VerifyRecoveryCaptchaRequest:
    properties:
      account:
        type: string
      captcha:
        type: string
      type:
        enum:
        - email
        - phone
        type: string
    required:
    - account
    - captcha
    type: object
  dto.VerifyRecoveryCaptchaResponse:
    properties:
      recoveryToken:
        description: 返回一次性的账号恢复令牌
        type: string
    type: object
  response.Response:
    properties:
      code:
        description: 业务状态码
        type: integer
      data:
        description: 响应数据
      message:
        description: 响应消息
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
    url: http://www.example.com/support
  description: 短链接生成与管理服务的 API 文档
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: 短链接服务 API
  version: "1.0"
paths:
  /admin/users:
    get:
      consumes:
      - application/json
      description: 管理员获取用户列表，支持分页和筛选
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: pageSize
        type: integer
      - description: 用户名（模糊查询）
        in: query
        name: username
        type: string
      - description: 用户状态
        in: query
        name: status
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 用户未认证
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 无权访问
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 获取用户列表
      tags:
      - 管理员-用户管理
  /admin/users/{id}/session:
    delete:
      consumes:
      - application/json
      description: 管理员强制指定用户下线
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 强制下线成功
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: 无效的用户ID
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 用户未认证
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 无权访问
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 强制用户下线
      tags:
      - 管理员-用户管理
  /admin/users/{id}/status:
    put:
      consumes:
      - application/json
      description: 管理员更新用户状态（正常/禁用/锁定）
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      - description: 状态信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateUserStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 用户未认证
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 无权访问
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 更新用户状态
      tags:
      - 管理员-用户管理
  /api/v1/share/uniqueshortcode/:shortCode:
    get:
      responses: {}
  /login:
    post:
      consumes:
      - application/json
      description: 用户登录获取访问令牌
      parameters:
      - description: 登录信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.LoginResponse'
              type: object
        "400":
          description: 用户名或密码错误
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 用户状态异常
          schema:
            $ref: '#/definitions/response.Response'
      summary: 用户登录
      tags:
      - 用户模块
  /register:
    post:
      consumes:
      - application/json
      description: 新用户注册，需要先获取验证码
      parameters:
      - description: 注册信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 注册成功
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "409":
          description: 用户已存在
          schema:
            $ref: '#/definitions/response.Response'
      summary: 用户注册
      tags:
      - 用户模块
  /users/{id}:
    delete:
      consumes:
      - application/json
      description: 删除指定用户（软删除）
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: 无效的用户ID
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 用户未认证
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 无权访问
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 删除用户
      tags:
      - 用户模块
    get:
      consumes:
      - application/json
      description: 获取指定用户的详细信息
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserResponse'
              type: object
        "400":
          description: 无效的用户ID
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 用户未认证
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 无权访问
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 获取用户信息
      tags:
      - 用户模块
    put:
      consumes:
      - application/json
      description: 更新指定用户的基本信息
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 用户未认证
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 无权访问
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 更新用户信息
      tags:
      - 用户模块
  /users/{id}/reset:
    put:
      consumes:
      - application/json
      description: 用户修改自己的密码
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      - description: 密码信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdatePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 密码修改成功
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 用户未认证
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 无权访问
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 修改密码
      tags:
      - 用户模块
  /users/check:
    get:
      consumes:
      - application/json
      description: 检查用户名或邮箱是否已被注册，至少传入一个参数
      parameters:
      - description: 用户名
        in: query
        name: username
        type: string
      - description: 邮箱
        in: query
        name: email
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.CheckExistenceResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.Response'
      summary: 检查用户名或邮箱是否存在
      tags:
      - 用户模块
  /users/logout:
    post:
      consumes:
      - application/json
      description: 用户退出登录，使当前令牌失效
      produces:
      - application/json
      responses:
        "200":
          description: 退出登录成功
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 用户未认证
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 退出登录
      tags:
      - 用户模块
  /users/password/forgot:
    post:
      consumes:
      - application/json
      description: 发送密码重置验证码到用户邮箱或手机
      parameters:
      - description: 账号信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 验证码已发送
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/response.Response'
      summary: 忘记密码
      tags:
      - 用户模块
  /users/password/reset:
    post:
      consumes:
      - application/json
      description: 使用重置令牌设置新密码
      parameters:
      - description: 重置信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 密码重置成功
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 令牌无效或已过期
          schema:
            $ref: '#/definitions/response.Response'
      summary: 重置密码
      tags:
      - 用户模块
  /users/password/verify:
    post:
      consumes:
      - application/json
      description: 验证用于重置密码的验证码，返回重置令牌
      parameters:
      - description: 验证码信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.VerifyOnceCaptchaRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 验证成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.VerifyCaptchaResponse'
              type: object
        "400":
          description: 验证码错误
          schema:
            $ref: '#/definitions/response.Response'
      summary: 验证重置密码验证码
      tags:
      - 用户模块
  /users/recovery/execute:
    post:
      consumes:
      - application/json
      description: 使用恢复令牌执行账号恢复操作
      parameters:
      - description: 恢复令牌
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ExecuteRecoveryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 账号恢复成功
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 令牌无效或已过期
          schema:
            $ref: '#/definitions/response.Response'
      summary: 执行账号恢复
      tags:
      - 用户模块
  /users/recovery/request:
    post:
      consumes:
      - application/json
      description: 发送账号恢复验证码
      parameters:
      - description: 账号信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RequestRecoveryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 验证码已发送
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.Response'
      summary: 请求恢复账号
      tags:
      - 用户模块
  /users/recovery/verify:
    post:
      consumes:
      - application/json
      description: 验证账号恢复验证码，返回恢复令牌
      parameters:
      - description: 验证码信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.VerifyRecoveryCaptchaRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 验证成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.VerifyRecoveryCaptchaResponse'
              type: object
        "400":
          description: 验证码错误
          schema:
            $ref: '#/definitions/response.Response'
      summary: 验证恢复验证码
      tags:
      - 用户模块
  /users/token/refresh:
    post:
      consumes:
      - application/json
      description: 使用刷新令牌获取新的访问令牌
      parameters:
      - description: 刷新令牌
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 令牌刷新成功
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 令牌无效或已过期
          schema:
            $ref: '#/definitions/response.Response'
      summary: 刷新访问令牌
      tags:
      - 用户模块
securityDefinitions:
  BearerAuth:
    description: '输入格式: Bearer {token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
